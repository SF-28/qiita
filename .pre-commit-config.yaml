# managed-by: harness-creator commit-gate
# このファイルは registry (commit-gate-tools.json) の baseline エントリから生成されている。
# 手編集より registry 更新 + create-harness 再実行を推奨。
# repo 依存ツール (linter/formatter/type-checker/test/SAST/SCA 等) は registry.categories
# (種別+例) を参考に、references/commit-gate-pattern.md の手順で承認の上ここへ追記する。
# 有効化: pre-commit install        pin 更新: pre-commit autoupdate
default_install_hook_types: [pre-commit, commit-msg, pre-push]
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        stages: [pre-commit]
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        args: ["--strict"]
        additional_dependencies: ["@commitlint/config-conventional"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
        exclude: '^\.claude/hooks/'
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: '^\.claude/hooks/'
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-case-conflict
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]
        exclude: '^\.claude/hooks/'
      - id: check-yaml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]
      - id: check-shebang-scripts-are-executable
        stages: [pre-commit]
      - id: forbid-submodules
        stages: [pre-commit]
      - id: destroyed-symlinks
        stages: [pre-commit]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: commit-gate-freshness
        name: commit-gate freshness check
        entry: node harness/commit-gate-check.mjs
        language: system
        always_run: true
        pass_filenames: false
        verbose: true
        stages: [pre-push]
